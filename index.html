<!DOCTYPE html>
<html>
<head>
<title>PENDEJO</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
}

#boton{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;
font-size:30px;
cursor:pointer;
}

#imagen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

#texto{
display:none;
position:absolute;
top:20%;
left:50%;
transform:translateX(-50%);
font-size:40px;
}
</style>

</head>
<body>

<button id="boton" onclick="iniciar()">Púlsame</button>

<img id="imagen" src="mono.jpg">

<div id="texto">¡PENDEJO PENDEJO PENDEJO!</div>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
function iniciar(){

document.getElementById("musica").play();

let elem = document.documentElement;
if (elem.requestFullscreen) {
elem.requestFullscreen();
}

document.getElementById("boton").style.display="none";
document.getElementById("imagen").style.display="block";
document.getElementById("texto").style.display="block";

}
</script>

</body>
</html>
